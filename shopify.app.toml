client_id = "6f6c83692d275fd284accad7d5a6fefd"
name = "AI Art Studio"
application_url = "https://appai-pod-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2024-10"

[access_scopes]
# write_content required for creating/updating Shopify Pages via Admin API
scopes = "read_products,read_themes,write_products,write_themes,write_content,read_content"

[app_proxy]
# Storefront → backend proxy. No CORS, no hardcoded app URLs in theme extension.
# Storefront calls /apps/appai/* → our backend /api/proxy/*
# Shopify adds shop, timestamp, signature query params automatically.
prefix = "apps"
subpath = "appai"
url = "https://appai-pod-production.up.railway.app/api/proxy"

[auth]
redirect_urls = [
  "https://appai-pod-production.up.railway.app/auth/callback",
  "https://appai-pod-production.up.railway.app/shopify/callback",
  "https://appai-pod-production.up.railway.app/api/auth/callback"
]
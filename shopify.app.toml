client_id = "6f6c83692d275fd284accad7d5a6fefd"
name = "AI Art Studio"
application_url = "https://appai-pod-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request" ]
uri = "/shopify/webhooks/customers-data-request"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/redact" ]
uri = "/shopify/webhooks/customers-redact"

[[webhooks.subscriptions]]
compliance_topics = [ "shop/redact" ]
uri = "/shopify/webhooks/shop-redact"

# orders/paid is required to debit the credit ledger after a redeemed
# Function discount. It carries protected customer data (email, address,
# customer GID) so it cannot be declared here until the app is approved
# for "Protected Customer Data" access in the Partners Dashboard.
# Once approved, re-add:
#
# [[webhooks.subscriptions]]
# topics = [ "orders/paid" ]
# uri = "/shopify/webhooks/orders-paid"
#
# The handler in server/routes.ts is already live and idempotent, so the
# moment the subscription is re-enabled, redemption debits + audit rows
# resume automatically.
#
# Design product sale recording (My Orders stats dashboard) piggybacks on this
# same orders/paid handler — see recordDesignProductSalesForOrder in
# server/design-product-events.ts. No separate re-enable step needed.

# carts/create + carts/update feed the "add to cart" counts on the My Orders
# stats dashboard for permanent design products. Also contains protected
# customer data (cart.customer), so they wait on the same PCD approval as
# orders/paid above. Handlers already exist and are idempotent:
#
# [[webhooks.subscriptions]]
# topics = [ "carts/create" ]
# uri = "/shopify/webhooks/carts-create"
#
# [[webhooks.subscriptions]]
# topics = [ "carts/update" ]
# uri = "/shopify/webhooks/carts-update"

[access_scopes]
# write_content required for creating/updating Shopify Pages via Admin API
scopes = "read_products,read_themes,write_products,write_themes,write_content,read_content,write_publications,read_online_store_navigation,write_online_store_navigation,read_customers,write_customers,read_orders,write_resource_feedbacks"

[app_proxy]
# Storefront → backend proxy. No CORS, no hardcoded app URLs in theme extension.
# Storefront calls /apps/appai/* → our backend /api/proxy/*
# Shopify adds shop, timestamp, signature query params automatically.
prefix = "apps"
subpath = "appai"
url = "https://appai-pod-production.up.railway.app/api/proxy"

[auth]
redirect_urls = [
  "https://appai-pod-production.up.railway.app/auth/callback",
  "https://appai-pod-production.up.railway.app/shopify/callback",
  "https://appai-pod-production.up.railway.app/api/auth/callback"
]